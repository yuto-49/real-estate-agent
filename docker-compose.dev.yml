services:
  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
      - "5678:5678"  # debugpy
    env_file: .env
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development
    networks:
      - shared-dev

networks:
  shared-dev:
    external: true
    name: shared-dev
